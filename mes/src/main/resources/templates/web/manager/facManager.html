<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}"
      layout:fragment="Content">
<head>
    <link rel="stylesheet" href="https://uicdn.toast.com/grid/latest/tui-grid.css"/>
    <script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
            integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
            crossorigin="anonymous"></script>
    <link th:href="@{/css/order.css}" rel="stylesheet">
    <style>
        .search-container {
        display: flex;
        justify-content: space-between; 
        align-items: center; 
        gap: 10px; 
    }
    .input-group {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 50%;
    }
    .input-group select,
    .input-group input[type="text"] {
        width: calc(33.33% - 20px);
    }
    .button-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    </style>
</head>
<body>
<div class="container">
    <div>
        <form name="search-form" autocomplete="off" onsubmit="getSearchList(); return false;">
            <h3 style="margin-top: 50px; font-weight: bold; margin-bottom: 20px; ">설비 관리</h3>

            <div class="search-container">
                <div class="input-group">
                    <select class="form-select order-select" aria-label="Default select example" name="type">
                        <option selected value="facName">설비명</option>
                        <!-- <option value="facClassCode">분류</option>  -->
                    </select>
                    <input class="form-control me-2 order-search" type="text" name="keyword">
                    <input type='button' class="btn btn-outline-primary" value="검색" onclick="getSearchList()">
                </div>
                <div class="button-group">
                    <input type='button' class="btn btn-outline-success" value="등록" id="appendBtn">
                    <input type='button' class="btn btn-outline-info" value="저장" id="saveBtn">
                    <input type='button' class="btn btn-outline-danger" value="삭제" id="delBtn">
                </div>
            </div>
        </form>
    </div>
    <h3 style="margin-top: 50px;"></h3>
    <div class="row">
        <div class="col-12" style="margin-bottom: 50px">
            <div id="grid"></div>
        </div>
    </div>
    <div id="pagination" class="tui-pagination"></div>
    <input type="file" id="imageUpload" style="display:none" multiple>
</div>

<script th:inline="javascript">
const token = $("meta[name='_csrf']").attr("content");
const header = $("meta[name='_csrf_header']").attr("content");
var facList = [[${facList}]];
let pList = [];
let fList = [];

class ImageRenderer {
    constructor(props) {
        const el = document.createElement('img');
        el.src = this.addTimestampToUrl(props.value ? props.value : '/facImages/default_image.png');
        el.style.width = '150px';
        el.style.height = '150px';
        el.style.cursor = 'pointer';
        el.addEventListener('click', () => {
            document.getElementById('imageUpload').setAttribute('data-row-key', props.rowKey);
            document.getElementById('imageUpload').click();
        });
        this.el = el;
    }

    addTimestampToUrl(url) {
        const timestamp = new Date().getTime();
        return `${url}?t=${timestamp}`;
    }

    getElement() {
        return this.el;
    }

    render(props) {
        this.el.src = this.addTimestampToUrl(props.value ? props.value : '/facImages/default_image.png');
    }
}

const grid = new tui.Grid({
    el: document.getElementById('grid'),
    data: facList,
    scrollX: false,
    scrollY: false,
    rowHeight: 160,
    bodyHeight: 500,
    rowHeaders: ['checkbox'],
    columns: [
        {header: '설비코드', name: 'facCode', align: 'center' },
        {header: '설비명', name: 'facName', align: 'center' ,editor : 'text'},
        {header: '구분', name: 'facClassCode', align: 'center' ,editor : 'text',
            formatter: 'listItemText',
            editor: {
                type: 'select',
                options: {
                  listItems: pList
          }
        }
        },
        {header: '제조일자', name: 'manufactureDate' , editor: 'datePicker',},
        {header: '설치일자', name: 'installDate', align: 'center' },
        {header: '점검주기', name: 'inspectCycle', align: 'center' ,editor: 'text'},
        {
            header: '이미지',
            name: 'image',
            align: 'center',
            renderer: {
                type: ImageRenderer
            },
            width: 160
        },
        {header: '업로드경로', name: 'uploadPath', align: 'center', hidden: true,},
        {header: '점검일자', name: 'dateCheck', align: 'center' , editor: 'datePicker'},
        {header: '설비상태', name: 'facStatus', align: 'center',
            formatter: 'listItemText',
            editor: {
                type: 'select',
                options: {
                  listItems: fList
          }
        }
        }
    ]
});

document.getElementById('imageUpload').addEventListener('change', uploadImages);

function uploadImages() {
    let formData = new FormData();
    let files = document.getElementById('imageUpload').files;
    let rowKey = document.getElementById('imageUpload').getAttribute('data-row-key');
    let facCode = grid.getRow(rowKey).facCode; // 현재 선택된 행의 facCode 가져오기

    for (let i = 0; i < files.length; i++) {
        formData.append('files', files[i]);
    }
    formData.append('facCode', facCode);

    $.ajax({
        url: '/admin/uploadFacImage',
        type: 'POST',
        beforeSend: function(xhr) {
            xhr.setRequestHeader(header, token);
        },
        data: formData,
        processData: false,
        contentType: false,
        success: function(response) {
            toastr.success('이미지가 업로드되었습니다.');
            updateGridImage(rowKey, response); // 그리드 데이터 갱신
        },
        error: function(response) {
            toastr.error('업로드에 실패했습니다.');
        }
    });
}

function updateGridImage(rowKey, imageUrls) {
    // 첫 번째 이미지를 설정
    let imageUrl = imageUrls[0] + '?t=' + new Date().getTime(); // URL에 타임스탬프 추가
    grid.setValue(rowKey, 'image', imageUrl);
    grid.resetOriginData();

    // 강제로 이미지 갱신
    let cell = grid.getElement(rowKey, 'image');
    if (cell) {
        let img = cell.querySelector('img');
        if (img) {
            img.src = imageUrl;
        }
    }
}

function getSearchList() {
    $.ajax({
        type: 'get',
        beforeSend: function(xhr) {
            xhr.setRequestHeader(header, token);
        },
        url: '/admin/facGetSearchList',
        data: $("form[name=search-form]").serialize(),
        success: function(result) {
            if (result.length > 0) {
                grid.resetData(result);
            } else {
                grid.clear();
            }
        }
    });
}

const saveBtn = document.getElementById('saveBtn');
saveBtn.addEventListener('click', () => {
    let changes = grid.getModifiedRows();
    let valid = true;

    if (!valid) {
        return;
    }

    if (changes.createdRows.length >= 1) {
        console.log('Created Rows:', changes.createdRows);
        $.ajax({
            type: 'POST',
            beforeSend: function(xhr) {
                xhr.setRequestHeader(header, token);
            },
            url: '/admin/fac',
            contentType: 'application/json',
            data: JSON.stringify(changes.createdRows),
            success: function(response) {
                toastr.success('등록되었습니다.');
            }
        });
    } else if (changes.updatedRows.length > 0) {
        console.log('수정된 행 :', changes.updatedRows);
        $.ajax({
            type: 'PUT',
            beforeSend: function(xhr) {
                xhr.setRequestHeader(header, token);
            },
            url: '/admin/fac',
            contentType: 'application/json',
            data: JSON.stringify(changes.updatedRows),
            success: function(response) {
                toastr.success('수정되었습니다.');
                grid.resetOriginData();
                grid.refreshLayout();
            }
        });
    } else {
        toastr.info('변경된 데이터가 없습니다.');
    }
});

const delBtn = document.getElementById('delBtn');
delBtn.addEventListener('click', () => {
    let check = grid.getCheckedRows();
    if (check.length > 0) {
        $.ajax({
            type: 'DELETE',
            beforeSend: function(xhr) {
                xhr.setRequestHeader(header, token);
            },
            url: '/admin/fac',
            contentType: 'application/json',
            data: JSON.stringify(check),
            success: function(response) {
                if (response === "삭제완료") {
                    toastr.error('삭제되었습니다.');
                    grid.removeCheckedRows();
                    grid.refreshLayout();
                } else {
                    toastr.error('삭제 실패');
                }
            }
        });
    } else {
        toastr.warning('삭제할 행을 선택하세요.');
    }
});

const appendBtn = document.getElementById('appendBtn');
appendBtn.addEventListener('click', () => {
    let newRow = {
        facName: '',
        manufactureDate: '',
        installDate: '',
        inspectCycle: '',
        image: '',
        uploadPath: '',
        facClassCode: '',
        facStatus: '',
        dataCheck: ''
    };

    grid.appendRow(newRow);
    grid.refreshLayout();
    toastr.success('새 행이 추가되었습니다.');
});

function facOptions() {
    $.ajax({
        url: "/admin/facOptionList",
        beforeSend : function(xhr) {
            xhr.setRequestHeader(header, token);
        },
        method: "GET",
        success: function(result) {
            result.forEach(code => {
                if (code.mainCode === 'FD') {
                    pList.push({
                        text: code.subCodeName,
                        value: code.subCode
                    });
                } else if (code.mainCode == 'FS') {
                    fList.push({
                        text: code.subCodeName,
                        value: code.subCode
                    });
                }
            });

            grid.setColumns([
                {header: '설비코드', name: 'facCode', align: 'center' },
                {header: '설비명', name: 'facName', align: 'center' ,editor : 'text'},
                {header: '구분', name: 'facClassCode', align: 'center' ,editor : 'text',
                    formatter: 'listItemText',
                    editor: {
                        type: 'select',
                        options: {
                            listItems: pList
                        }
                    }},
                {header: '제조일자', name: 'manufactureDate' , editor: 'datePicker', align: 'center'},
                {header: '설치일자', name: 'installDate', align: 'center' },
                {header: '점검주기', name: 'inspectCycle', align: 'center' ,editor: 'text'},
                {
                    header: '이미지',
                    name: 'image',
                    align: 'center',
                    renderer: {
                        type: ImageRenderer
                    },
                    width: 160
                },
                {header: '업로드경로', name: 'uploadPath', align: 'center' , hidden: true},
                {header: '점검일자', name: 'dateCheck', align: 'center' , editor: 'datePicker'},
                {header: '설비상태', name: 'facStatus', align: 'center',
                    formatter: 'listItemText',
                    editor: {
                        type: 'select',
                        options: {
                            listItems: fList
                        }
                    }}
            ]);
            grid.resetData(facList); 
        },
        error: function(error) {
            console.error('AJAX 요청 실패:', error);
        }
    });
}
facOptions()
$('.tui-grid-body-container').css("cursor","pointer")
</script>
</body>
</html>
