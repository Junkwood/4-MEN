<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}"
	layout:fragment="Content">
<head>
<link rel="stylesheet"
	href="https://uicdn.toast.com/grid/latest/tui-grid.css" />
<script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.js"
	integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
	crossorigin="anonymous"></script>
<link th:href="@{/css/order.css}" rel="stylesheet">
<style>
    .search-container {
        display: flex;
        justify-content: space-between; 
        align-items: center; 
        gap: 10px; 
    }
    .input-group {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 50%; 
    }
    .input-group select,
    .input-group input[type="text"] {
        width: calc(33.33% - 20px);
    }
    .button-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
</style>
</head>
<body>
<div class="container">
		<div>
			<form name="search-form" autocomplete="off" onsubmit="getSearchList()">
				<h3 style="margin-top: 50px; font-weight: bold; margin-bottom: 20px;">자재 관리</h3>

				<div class="search-container">
					<div class="input-group">
						<select class="form-select order-select" aria-label="Default select example" name="type">
							<option selected value="matName">자재명</option>
							<!-- <option value="matClass">분류</option> -->
						</select> 
						<input class="form-control me-2 order-search" type="text" name="keyword">
						<input type='button' class="btn btn-outline-primary" value="검색" onclick="getSearchList()">
					</div>
					<div class="button-group">
						<input type='button' class="btn btn-outline-success" value="등록" id="appendBtn"> 
						<input type='button' class="btn btn-outline-info" value="저장" id="saveBtn"> 
						<input type='button' class="btn btn-outline-danger" value="삭제" id="delBtn">
					</div>
				</div>
			</form>
		</div>
		<h3 style="margin-top: 50px;"></h3>
	<div class="row">
		<div class="col-12" style="margin-bottom: 50px">
			<div id="grid"></div>
		</div>
	</div>
</div>

<script th:inline="javascript">
const token = $("meta[name='_csrf']").attr("content")
const header = $("meta[name='_csrf_header']").attr("content");

let mList = [];
let materialList = [[${materialList}]]; 

function initGrid() {
	grid = new tui.Grid({
		el: document.getElementById('grid'),
		data: materialList, 
		scrollX: false,
		scrollY: false,
		rowHeaders: [  { type: 'rowNum' }, { type: 'checkbox' }],
		pageOptions: { useClient: true, perPage: 10 },
		rowHeaders: ['checkbox'],
		columns: [
			{ header: '자재코드', name: 'matCode' , align : 'center' },
			{ header: '자재명', name: 'matName' , align : 'center' , editor: 'text'},
			{ header: '분류', name: 'matClass' , align : 'center' , editor: 'text',
				formatter: 'listItemText',
				editor: {
					type: 'select',
					options: {
					  listItems: mList
			  },
				}
			},
			{ header: '단위', name: 'unit' , align : 'center' , editor: 'text'},
			{ header: '규격', name: 'standard' , align : 'center' , editor: 'text'},
			{ header: '재고', name: 'safetystock' , align : 'center' , editor: 'text'},
		]
	});
}

function getSearchList() {
	$.ajax({
		type: 'get',
		url: '/admin/materialGetSearchList',
		beforeSend : function(xhr) {
			xhr.setRequestHeader(header, token);
		},
		data: $("form[name=search-form]").serialize(),
		success: function(result) {
			if (result.length > 0) {
				grid.resetData(result); // 그리드에 데이터를 넣음
			} else {
				grid.clear(); // 그리드 데이터 비움
			}
		}
	});
}   

const appendBtn = document.getElementById('appendBtn');
appendBtn.addEventListener('click', () => {
	let newRow = {  
		matName: '',
		matClass: '',
		unit: '',
		standard: '',
		safetystock: ''
	};
	console.log("새로운 행 : ", + newRow);

	grid.appendRow(newRow);
	grid.refreshLayout();
	toastr.success('행이 추가되었습니다.');
});

let delBtn = document.getElementById('delBtn');
delBtn.addEventListener('click', () => {
	let check = grid.getCheckedRows(); // 체크된 행의 갯수를 가져옴
	if (check.length > 0) {
		$.ajax({
			type: 'DELETE',
			url: '/admin/mat',
			contentType: 'application/json',
			beforeSend : function(xhr) {
				xhr.setRequestHeader(header, token);
			},
			data: JSON.stringify(check),
			success: function(response) {
				if (response === "삭제완료") {
					toastr.success('삭제되었습니다.');
					grid.removeCheckedRows();
				} else {
					toastr.error('이미 사용되고 있는 자재입니다.');
				}
			}
		});
	} else {
		toastr.warning('삭제할 행을 선택하세요.');
	}
});

let saveBtn = document.getElementById('saveBtn');
saveBtn.addEventListener('click', () => {
	let changes = grid.getModifiedRows();
	let valid = true;

	changes.createdRows.forEach(row => {
		if (!row.matName || row.matName.trim() === "") {
			toastr.error('자재명을 입력 후 엔터를 쳐주세요.');
			valid = false;
			return;
		}
	});

	if (!valid) {
		return;
	}

	if (changes.createdRows.length >= 1) {
		$.ajax({
			type: 'POST',
			url: '/admin/mat',
			contentType: 'application/json',
			beforeSend : function(xhr) {
				xhr.setRequestHeader(header, token);
			},
			data: JSON.stringify(changes.createdRows),
			success: function(response) {
				toastr.success('등록되었습니다.');
			}
		});
	} else if (changes.updatedRows.length > 0) {
		$.ajax({
			type: 'PUT',
			url: '/admin/mat',
			contentType: 'application/json',
			beforeSend : function(xhr) {
				xhr.setRequestHeader(header, token);
			},
			data: JSON.stringify(changes.updatedRows),
			success: function(response) {
				if (response) {
					toastr.success('수정되었습니다.');
					grid.resetOriginData(response);
				} else {
					toastr.error('저장 실패');
				}
			}
		});
	}
});

document.querySelector('form[name="search-form"]').addEventListener('submit', (e) => {
	e.preventDefault(); // 기본 폼 제출 동작 방지
	getSearchList(); // 검색 함수 호출
});

function matOptions() {
	$.ajax({
		url: "/admin/matOptionList",
		beforeSend : function(xhr) {
			xhr.setRequestHeader(header, token);
		},
		method: "GET",
		success: function(result) {
			console.log("Received options:", result);
			result.forEach(code => {
				mList.push({
					text: code.subCodeName,
					value: code.subCode
				});
			});
			console.log("Initializing grid with plist:", mList);
			initGrid();
		},
		error: function(error) {
			console.error('AJAX 요청 실패:', error);
		}
	});
}
matOptions();
$('.tui-grid-body-container').css("cursor","pointer");
</script>
</body>
</html>
