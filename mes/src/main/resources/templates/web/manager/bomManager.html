<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}"
	layout:fragment="Content">
<head>
<link rel="stylesheet"
	href="https://uicdn.toast.com/grid/latest/tui-grid.css" />
<script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.js"
	integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
	crossorigin="anonymous"></script>
<link th:href="@{/css/order.css}" rel="stylesheet">
<style>
.search-container {
	display: flex;
	justify-content: space-between;
	align-items: center;
	gap: 10px;
}

.input-group {
	display: flex;
	align-items: center;
	gap: 10px;
	width: 50%;
}

.input-group select, .input-group input[type="text"] {
	width: calc(33.33% - 20px);
}

.button-group {
	display: flex;
	align-items: center;
	gap: 10px;
}
</style>
</head>

<body>
	<div class="container">
		<form name="search-form" autocomplete="off"
			onsubmit="getSearchList(); return false;">
			<h3 style="margin-top: 50px; font-weight: bold; margin-bottom: 20px;">제품
				조회</h3>

			<div class="search-container">
				<div class="input-group">
					<select style="width: 10px;" class="form-select order-select"
						aria-label="Default select example" name="type">
						<option selected value="prodName">제품명</option>
					</select> <input class="form-control me-2 order-search" type="text"
						name="keyword" style="width: 10px;"> <input type='button'
						class="btn btn-outline-primary" value="검색"
						onclick="getSearchList()">
				</div>
				<div class="button-group">
					<input type='button' class="btn btn-outline-success" value="저장"
						id="saveBtn">
				</div>
			</div>
		</form>
		<div class="col-12" style="margin-top: 50px">
			<div id="grid"></div>
		</div>


		<h3 style="margin-top: 50px; font-weight: bold;">BOM 관리</h3>
		<input type="button" class="btn btn-outline-danger" id="delBtn"
			value="ㅡ"
			style="float: right; margin-right: 15px; margin-bottom: 10px;">
		<input type="button" class="btn btn-outline-success" id="appendBtn"
			value="╆"
			style="float: right; margin-right: 15px; margin-bottom: 10px;">


		<div class="col-12">
			<div id="grid2"></div>
		</div>

	</div>

	<!-- 자재코드 클릭시 나타나는 모달창 -->
	<div class="modal fade" id="search-Mat-Modal" tabindex="-1"
		aria-labelledby="exampleModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-lg">
			<div class="modal-content">
				<div class="modal-header">
					<h1 class="modal-title fs-4 order-search-title"
						id="exampleModalLabel">자재 조회</h1>

					<div class="order-search-nav">
						<!-- 검색 조건 설정 -->
						<div class="form-check form-check-inline">
							<input class="form-check-input" type="radio"
								name="flexRadioDefault" id="flexRadioDefault1" value="matName"
								checked> <label class="form-check-label"
								for="flexRadioDefault1"> 자재명 </label>
						</div>


						<!-- 검색 입력창 -->
						<input class="form-control me-2 order-search"
							id="modal-search-mat-input" type="search"
							placeholder="Search" aria-label="Search">
						<!-- 검색 버튼 -->
						<button class="btn btn-outline-success"
							id="modal-mat-search-btn" type="submit">검색</button>
					</div>

					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<div id="grid-modal-mat"></div>
					<!-- 모달 내의 그리드 -->
				</div>
				<div class="modal-footer"></div>
			</div>
		</div>
	</div>
</body>
<script src="https://code.jquery.com/jquery-3.7.1.js"
	integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
	crossorigin="anonymous"></script>
<script
	src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script th:inline="javascript">
	const token = $("meta[name='_csrf']").attr("content")
	const header = $("meta[name='_csrf_header']").attr("content");
	
    let selectedRowKey; // 선택된 rowKey를 저장할 변수
    
    let bom = [[${bomList}]];
    let prod = [[${bomProdList}]];

    console.log(prod); // 초기 데이터를 콘솔에 출력
	let selectNote = "";
    let selectProd = ""; 
    let maxBomCode = 0; 
    let grid = new tui.Grid({
        el: document.getElementById('grid'),
        data: prod,
        scrollX: false,
        scrollY: false,
        rowHeaders: [{ type: 'rowNum' }, { type: 'checkbox' }],
        pageOptions: { useClient: true, perPage: 10 },
        columns: [
            { header: '제품코드', name: 'prodCode', align: 'center' },
            { header: '제품명', name: 'prodName', align: 'center' },
            { header: '단위', name: 'unit', align: 'center' }
        ]
    });

    grid.on("click", (e) => {
        if (e.rowKey , 'prodCode') {
            selectProd = grid.getValue(e.rowKey, "prodCode");
            getBomProd(selectProd);
        }
    });

    let grid2 = new tui.Grid({
        el: document.getElementById('grid2'),
        scrollX: false,
        scrollY: false,
        rowHeaders: [{ type: 'rowNum' }, { type: 'checkbox' }],
        pageOptions: { useClient: true, perPage: 5 },
        columns: [
            { header: 'bom코드', name: 'bomCode', align: 'center' , editor: 'text' , hidden : true},
            { header: '제품명', name: 'prodName', align: 'center' , hidden : true},
            { header: '자재코드', name: 'matCode', align: 'center' },
            { header: '자재명', name: 'matName', align: 'center' },
            { header: '단위', name: 'unit', align: 'center' },
            { header: '사용량', name: 'useAmount', editor: 'text', align: 'center' },
            { header: '비고', name: 'note', editor: 'text', align: 'center' },
            { header: '제품코드', name: 'prodCode', editor: 'text', align: 'center' , hidden: true},
            
            
        ]
    });

    function getBomProd(prodCode) {
        $.ajax({
            url: '/admin/bomList',
            method: 'GET',
            beforeSend : function(xhr) {
                xhr.setRequestHeader(header, token);
            },
            data: { prodCode: prodCode },
            success: function(result) {
                console.log(result); // 결과 데이터를 콘솔에 출력
                grid2.resetData(result); // 화면에 데이터 업데이트
            },
            error: function(error) {
                console.error('조회 실패: 알 수 없는 에러 발생', error);
            }
        });
    }
     
    function getSearchList() {
        $.ajax({
            type: 'get',
            url: '/admin/bomGetSearchList',
            beforeSend : function(xhr) {
                xhr.setRequestHeader(header, token);
            },
            data: $("form[name=search-form]").serialize(),
            success: function(result) {
                console.log(result); // 결과 데이터를 콘솔에 출력
                if (result.length > 0) {
                    grid.resetData(result);
                } else {
                    grid.clear();
                }
        }
    })
    };
    
     const appendBtn = document.getElementById('appendBtn');
     appendBtn.addEventListener('click', () => {
    	 if (!selectProd) {
             toastr.error('제품을 선택하십시오.');
             return;
         }  
    	 
    	 
    	 let newRow = {     
    			 			matCode:'',
			                 matName: '',
			                 unit: '',
			                 useAmount: '',
			                 note: '' ,
			                 prodCode: selectProd }
            console.log("새로운 행 : ", + newRow);

            grid2.appendRow(newRow);
            grid2.refreshLayout();
        
    });
    
     
     
   

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.addEventListener('click', () => {
        let changes = grid2.getModifiedRows();
        let valid = true;

        changes.createdRows.forEach(row => {
            if (!row.useAmount || row.useAmount.trim() === "") {
                toastr.error('사용량을 입력 후 엔터를 쳐주세요.');
                valid = false;
                return;
            }
        });

        if (!valid) {
            return;
        }

        if (changes.createdRows.length >= 1) {
            console.log('Created Rows:', changes.createdRows); // 데이터 확인
            $.ajax({
                type: 'POST',
                url: '/admin/bom',
                contentType: 'application/json',
                beforeSend : function(xhr) {
                    xhr.setRequestHeader(header, token);
                },
                data: JSON.stringify(changes.createdRows),
                success: function(response) {
                    toastr.success('등록되었습니다.');
                    getBomProd(selectProd); // 데이터 저장 후 화면
                }
                
            });
        } else if (changes.updatedRows.length > 0) {
            console.log('수정갯수 :', changes.updatedRows); // 데이터 확인
            $.ajax({
                type: 'PUT',
                url: '/admin/bom',
                contentType: 'application/json',
                beforeSend : function(xhr) {
                    xhr.setRequestHeader(header, token);
                },
                data: JSON.stringify(changes.updatedRows),
                success: function(response) {
                    toastr.success('수정되었습니다.');
                    grid2.resetOriginData();
                    getBomProd(selectProd); // 데이터 수정 후 화면
                }
            });
        } else {
            toastr.info('변경된 데이터가 없습니다.');
        }
    });
	
    const delBtn = document.getElementById('delBtn');
    delBtn.addEventListener('click', () => {
        let check = grid2.getCheckedRows(); //체크된 행의 갯수를 가져옴
        if (check.length > 0) {
            $.ajax({
                type: 'DELETE',
                url: '/admin/bom',
                contentType: 'application/json',
                beforeSend : function(xhr) {
                    xhr.setRequestHeader(header, token);
                },
                data: JSON.stringify(check),
                success: function(response) {
                    if (response === "삭제완료") {
                        toastr.error('삭제되었습니다.');
                        grid2.removeCheckedRows();
                    } else {
                        toastr.error('삭제 실패');
                    }
                }
            });
        } else {
            toastr.warning('삭제할 행을 선택하세요.');
        }
    });
    
    
    //  =======================     모달     ========================
    // 자재 모달 그리드
    const matModalGrid = new tui.Grid({
        el: document.getElementById('grid-modal-mat'),
        scrollX: false,
        scrollY: false,
        pageOptions: {
            perPage: 5,
            useClient: true,
        },
        columns: [
            {
                header: '자재코드',
                name: 'matCode',
                align: 'center'
            },
            {
                header: '자재명',
                name: 'matName',
                align: 'center'
            },
            {
                header: '단위',
                name: 'unit',
                align: 'center'
            },
        ]
    }); 

    

    // 자재 조회 모달 그리드 이벤트 지정
    matModalGrid.on('click', (ev) => {
        selectedMatData = matModalGrid.getRow(ev.rowKey);
        let value = grid2.getColumnValues('matCode');
        if (selectedMatData != null){
            // grid2의 선택된 행의 정보를 업데이트
            if(value.includes(selectedMatData.matCode)){
            	toastr.error('이미 등록되어 있는 자재입니다.');
            	return;
            }
            	
            console.log("selectedMatData 자재 : " + selectedMatData.matCode);
            console.log("모달 selectedMatData : " + selectedMatData);
            grid2.setValue(selectedRowKey, 'matCode', selectedMatData.matCode);
            grid2.setValue(selectedRowKey, 'matName', selectedMatData.matName);
            grid2.setValue(selectedRowKey, 'unit', selectedMatData.unit);

            // 자재 조회 모달 닫기
            $('#search-Mat-Modal').modal('hide');
        }
    });

    grid2.on("click", (e) => {
        if (e.columnName == "matCode") {
            // 클릭된 행의 rowKey를 저장
            selectedRowKey = e.rowKey;
            // 모달 창을 띄우기
            $('#search-Mat-Modal').modal('show');
        }
    });

    // 자재 조회 모달 켜질 때 마다 실행될 이벤트 지정
    $('#search-Mat-Modal').on('shown.bs.modal', function(){
        let data = getMatCommonsData();
        matModalGrid.resetData(data);
        matModalGrid.refreshLayout();
    });

    // 자재 조회 모달 꺼질 때 마다 실행될 이벤트 지정
    $('#search-Mat-Modal').on('hidden.bs.modal', function(){
        $('#modal-search-mat-input').val('');
        matModalGrid.resetData([]);
        matModalGrid.refreshLayout();
    });

    // 자재 조회 모달 검색 버튼 이벤트 함수
    $('#modal-mat-search-btn').on('click', function(){
        // 현재 검색창의 입력값 가져오기
        let inputData = $('#modal-search-mat-input').val();
        let data = {
            matName : inputData
        };
        // 데이터 조회하기
        let foundData = searchMatData(data);
        matModalGrid.resetData(foundData != null ? foundData : []);
        matModalGrid.refreshLayout();
    });

    // 자재 조회 모달창 데이터 가져오기
    function getMatCommonsData(){
        let result;
        $.ajax({
            url: '/admin/matListAjax',
            method: 'GET',
            async: false,
            beforeSend : function(xhr) {
                xhr.setRequestHeader(header, token);
            },
            success: function(data){
                result = data;
            },
            error: function(error){
                toastr.error('에러');
            }
        });
        return result;
    };

    // 자재 조회 모달창 데이터 조회하기
    function searchMatData(data){
        let result;
        $.ajax({
            url: '/admin/matListAjax',
            method: 'POST',
            beforeSend : function(xhr) {
                xhr.setRequestHeader(header, token);
            },
            data: data,
            async: false,
            success: function(data){
                data.length > 0 ? result = data : toastr.error('조회된 데이터가 없습니다.');
            },
            error: function(error){
                toastr.error('에러');
            }
        });
        return result;
    }
    $('.tui-grid-body-container').css("cursor","pointer")
    </script>
</body>
</html>
