//작업지시 모달 검색 ajax
async function searchWork(search,keyword) {
  await fetch(`/work?search=${search}&keyword=${keyword}`)
      .then(res => res.json())
      .then(res => {
        grid4.resetData(res)
      })
  };
  //작업지시상세를 불러와 테이블에 넣는 비동기처리 함수.
    async function getWorkDetailList(workInstructCode) {
      await fetch(`/workDetail?workInstructCode=${workInstructCode}`)
        .then(res => res.json())
        .then(res => {
          for(let obj of res){
            obj.registrationDate = obj.registrationDate.substr(0,10);
          }
          grid.resetData(res);
          for(i=1; i<grid.getRowCount();i++){
            grid.disableCell(i,'workName')//첫행 제외 지시명 입력불가.
          }
          for(i=0; i<grid.getRowCount();i++){
            if(grid.getRow(i).processStatus!='요청'){
              grid.disableRow(i)
              grid.disableCell(0,'workName')
            }
            if(i!=0){
              continue;
              grid.disableCell(i,'workName')
            }
            
          }
        })
};

async function getMatList(prodCode,workInstructDetailCode) {
  await fetch(`/matLists?prodCode=${prodCode}&workInstructDetailCode=${workInstructDetailCode}`)
      .then(res => res.json())
      .then(res => {
          grid2.resetData(res);
      })
  };
  //자재의 로트별 재고를 불러오는 함수
  async function getLotList(matCode,workInstructDetailCode) {
  await fetch(`/lot?matCode=${matCode}&workInstructDetailCode=${workInstructDetailCode}`)
      .then(res => res.json())
      .then(res => {
        let require = grid2.getValue(rowkey2,'requireAmount')
        for(let obj of res){
          if((require-obj.stock)>=0){
            obj.holdQuantity = obj.stock;
            require=require-obj.stock;
          }else if((require-obj.stock)<0){
            obj.holdQuantity = require;
            require = 0;
          }
          if(obj.stock<obj.holdQuantity){
            obj.note="사용불가";
          }else{
            obj.note="사용가능"
          };
    
        };
          grid3.resetData(res);
          let matCode = grid3.getValue(rowkey2,"matCode");
          let sumhold = grid3.getSummaryValues("holdQuantity").sum;
      })
  };

  //작업지시 삽입 ajax
 function insertWorkInstruct(detailList){
  let res = null;
	$.ajax({
        url: "/WorkDetail",
        method: "POST",
        async : false,
        data: detailList,
        contentType: 'application/json',
        beforeSend : function(xhr) {
	            xhr.setRequestHeader(header, token);
	        },
        success: function(request,result) {
          res=request;
          grid.resetData([]);
          toastr.success("등록 완료")
        },
        error: function(error) {
          res=error;
          toastr.error('등록 실패:', error);
        }
    })
    return res;
}

//작업지시 상세 삭제ajax
function deleteWorkInstruct(detailList){
  let msg = null;
	$.ajax({
        url: "/WorkDetail",
        method: "delete",
        data: detailList,
        contentType : 'application/json',
        beforeSend : function(xhr) {
	            xhr.setRequestHeader(header, token);
	        },
        success: function(result) {
          toastr.success("삭제 완료");
        },
        error: function(request,error) {
            msg = request.responseText;
            toastr.error(msg)

    })

}
