<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}"
	layout:fragment="Content">
<head>
<link th:href="@{/css/order.css}" rel="stylesheet">
    <!-- https://github.com/nhn/tui.grid/blob/master/packages/toast-ui.grid/examples/example08-date-picker.html -->
  <style>
   body {
            background-color: #e9ecef;
        }
  #startpicker-container1,#endpicker-container1,#startpicker-container2,#endpicker-container2{
         position: relative;
 		 z-index: 9999;
    }
    .order-select1{
       display: inline;
	   width: 20%;
	   margin-right:10px;
    }
    .order-search1{
       display: inline;
	   width: 40%;
	   margin-right:20px;
    }
    .search {
            width:40%;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
            box-shadow: 4px 4px 4px 4px rgba(0, 0, 0, 0.1);
            margin-bottom:30px;
        }
    .search1 {
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 5px;
            box-shadow: 4px 4px 4px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 2%;
        }
        .search h3 {
            margin-bottom: 20px;
        }
  </style>
  </head>
<body>
   <div class="Container">
   		<h1 class="fw-bold py-1 mb-4 text-muted fw-light">자재 발주 상세 조회</h1>
		<div class="search">
			<h3 class="fw-bold py-1 mb-3 text-dark fw-light">검색조건</h3>
			<div>
			     <p class="fw-bold text-dark fw-light" style="display:inline-block;">등록일자</p>
			    <div class="tui-datepicker-input tui-datetime-input tui-has-focus">
			        <input id="startpicker-input1" type="text" aria-label="Date">
			        <span class="tui-ico-date"></span>
			        <div id="startpicker-container1"></div>
			    </div>
			    <span>~</span>
			    <div class="tui-datepicker-input tui-datetime-input tui-has-focus">
			        <input id="endpicker-input1" type="text" aria-label="Date">
			        <span class="tui-ico-date"></span>
			        <div id="endpicker-container1"></div>
			    </div>
			</div>
			<div>
			     <p class="fw-bold text-dark fw-light" style="display:inline-block;">납기일자</p>
			    <div class="tui-datepicker-input tui-datetime-input tui-has-focus">
			        <input id="startpicker-input2" type="text" aria-label="Date">
			        <span class="tui-ico-date"></span>
			        <div id="startpicker-container2" style="margin-left: -1px;"></div>
			    </div>
			    <span>~</span>
			    <div class="tui-datepicker-input tui-datetime-input tui-has-focus">
			        <input id="endpicker-input2" type="text" aria-label="Date">
			        <span class="tui-ico-date"></span>
			        <div id="endpicker-container2" style="margin-left: -1px;"></div>
			    </div>
			</div>
			
            <div style="display:flex; height: 35px;">
	            <select class="form-select order-select1"
					aria-label="Default select example" id=orderSelect1>
					<option selected value="ALL">전체</option>
					<option value="PS1">요청</option>
					<option value="PS2">처리중</option>
					<option value="PS3">처리완료</option>
				</select> 
	        
	            <select class="form-select order-select1"
					aria-label="Default select example" id=orderSelect2>
					<option selected value="ALL">전체</option>
					<option value="orderName">발주명</option>
					<option value="empName">요청자명</option>
					<option value="matName">자재명</option>
					<option value="clientName">업체명</option>
				</select> 
				<input class="form-control order-search1" type="search"
					placeholder="검색" aria-label="Search" id="searchOrder">
				<button class="btn btn-outline-primary searchBtn" type="button" id="searchBtn" style="width: 70px;">검색</button>
			</div>
     	</div>
    <!-- ===================================================== -->
		  <div class="search1">
		   <button class="btn btn-outline-success float-end" type="button" id="excel">XLSX</button>
		  <h3 class="fw-bold py-1 mb-4 text-dark fw-light">발주 목록</h3>
		   <div class="row orderCallTable">
			   <div class="col-12">
				    <div id="grid1"></div>
			   </div>
			</div>
			</div>
	</div>
</body>
<script th:inline="javascript">
//전역변수
let select1 = $('#orderSelect1');
let select2 = $('#orderSelect2');
let selectInput = $('#searchOrder');
	
var today = new Date();
var picker1 = tui.DatePicker.createRangePicker({
    startpicker: {
        input: '#startpicker-input1',
        container: '#startpicker-container1'
    },
    endpicker: {
        input: '#endpicker-input1',
        container: '#endpicker-container1'
    },
    format: 'YYYY-MM-dd',
});

var picker2 = tui.DatePicker.createRangePicker({
    startpicker: {
        input: '#startpicker-input2',
        container: '#startpicker-container2'
    },
    endpicker: {
        input: '#endpicker-input2',
        container: '#endpicker-container2'
    },
    format: 'YYYY-MM-dd',
});

const grid1 = new tui.Grid({
    el: document.getElementById('grid1'),
    scrollX: false,
    scrollY: false,
    pageOptions: {
        perPage: 10,
        useClient: true,
    },
    rowHeaders: [
	    { type: 'rowNum', align: 'center'},
	  ],
    columns: [
        { header: '발주코드', name: 'matOrderCode', align: 'center'},
        { header: '발주명', name: 'orderName', align: 'left'},
        { header: '등록일자', name: 'orderDate', align: 'center'},
        { header: '요청자', name: 'empName', align: 'center'},
        { header: '자재명', name: 'matName', align: 'left'},
        { header: '업체명', name: 'clientName', align: 'left'},
        { header: '요청수량', name: 'quantity', align: 'right'},
        { header: '기입고량', name: 'prodQuantity', align: 'right'},
        { header: '처리상태', name: 'orderStatus',align:'center',renderer:{
      	  styles:{
    		  backgroundColor:(props) => props.value == '요청'?  'rgba(252, 240, 3)' 
    		  : props.value == '처리중'?  'rgba(252, 3, 45)' 	  
    		  : props.value == '처리완료'?  'rgba(3, 252, 65)':''
    	  		}
      		}
        },
        { header: '납기일자', name: 'deliveryDate', align: 'center'}
        ],
});
searchData();

//검색 버튼 클릭 시 함수
$('#searchBtn').on('click', function(e){
	searchData();	
});

//검색 함수
function searchData(){
	let result;
	$.ajax({
		url: '/searchMatOrderAjax',
		method: 'GET',
		data: {
			select1Val : select1.val(),
			select2Val : select2.val(),
			selectInputVal : selectInput.val(),
			orderStartDate : $('#startpicker-input1').val(),
			orderEndDate : $('#endpicker-input1').val(),
			deliveryStartDate : $('#startpicker-input2').val(),
			deliveryEndDate : $('#endpicker-input2').val()
		},
		async: false,
		success: function(resData){
			resData != null ? result = resData : toastr.error("조회된 데이터가 없습니다.");	
		},
		error: function(error){
			toastr.error("데이터 조회 실패: 알 수 없는 에러 발생");
		}
	});	
	grid1.resetData(result != null ? result : []);
}

//엑셀
const topOptions = {
		  includeHiddenColumns: true,
		  onlySelected: false,
		  fileName: '주문 정보 조회',
		};
$('#excel').on('click',function(){
grid1.export('xlsx',topOptions);
})
</script>
</html>
