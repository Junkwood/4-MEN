  //제품목록 불러오는 비동기함수
  async function getProdList() {
  await fetch(`/prod`)
      .then(res => res.json())
      .then(res => {
        let objList=res;
        prod=res;
        objList.forEach(function(element){
          let obj = {text:element.prodName , value:element.prodCode};
          pList.push(obj);
        })
      })
  };
    //제품리스트 불러오는 함수 실행.
    getProdList();
  //생산계획목록 불러오는 비동기함수
  async function getManuPlan(search,keyword) {
  await fetch(`/manuPlan?search=${search}&keyword=${keyword}`)
      .then(res => res.json())
      .then(res => {
        grid3.resetData(res);
      })
  };
  //생산계획상세 불러오는 비동기함수
  async function getPlanDetail(manuPlanCode) {
    var result=null;
  await fetch(`/manuPlanDetail?manuPlanCode=${manuPlanCode}`)
      .then(res => res.json())
      .then(res => {
        grid2.resetData(res);
        result = res;
        let data=grid2.getData();
          for(let obj of data){
            if(obj.processStatus !='요청'){
              grid2.disableRow(obj.rowKey)
            }
          }
      })
      return result;
  };

  function insertPlandDetail(detailList){

	$.ajax({
        url: "/manuPlanDetail",
        method: "POST",
        async : false,
        data: detailList,

        beforeSend : function(xhr) {

//생산계획 상세 delete

//생산계획 delete
function deletePlan(manuPlanCode){
  let msg =null;
  $.ajax({
        url: "/deleteManuPlan",
        method: "post",
        async : false,
        contentType: 'application/x-www-form-urlencoded; charset=UTF-8',
        data: { manuPlanCode: manuPlanCode },
        dataType : 'json',
        beforeSend : function(xhr) {
	            xhr.setRequestHeader(header, token);
	        },
        success: function(request,result) {
          msg = request.responseText;
        },
        error: function(request, status, error) {
          msg = request.responseText;
        }
    })
    if(msg == '삭제완료'){
      toastr.success(msg)
    }else{
      toastr.error(msg)
    }
}

//주문코드로 ajax통해 상세주문조회 하기
function getDataByOrderCode(orderCode){
	$.ajax({
        url: "/orderDetailCodeList",
        method: "GET",
        data: {
        	orderCode: orderCode
        },
        beforeSend : function(xhr) {
	            xhr.setRequestHeader(header, token);
	        },
        success: function(result) {
          let i=0;
          grid2.resetData([]);
        	for(let obj of result){
            i++;
            obj.priority = i;
            obj.planQuantity = obj.orderQuantity;
            obj.unit = getUnit(obj.prodCode);
            grid2.appendRow(obj);
        	}

        	grid2.refreshLayout();
        },
        error: function(error) {
            toastr.error('AJAX 요청 실패:', error);
        }
    });
    $.ajax({
        url: "/orderCodeList",
        method: "GET",
        data: {
            orderCode: orderCode
        },
        beforeSend : function(xhr) {
	            xhr.setRequestHeader(header, token);
	        },
        success: function(result) {
        	
        	for(let obj of result){
        		if(obj.note == null || obj.note ==''){
        		 obj.note='';
        		}
            
            obj.registrationDate = today;
            obj.startDate = today;
            obj.empCode = empCode;
            obj.empName = empName;
            console.log(obj.dueDate)
            console.log(today)
            console.log(obj.dueDate<today)
            if(obj.dueDate<today){
              obj.endDate = today;
            }else{
              obj.endDate = obj.dueDate;
            }
        	}
        	grid.resetData(result);
        	grid.refreshLayout();

        },
        error: function(error) {
            toastr.error('AJAX 요청 실패:', error);
        }
    });
}

  //grid2에서 선택한 제품에 맞는 단위를 자동으로 기입하는 함수.
  function getUnit(prodCode){
    let unit;
    for(x=0;x<prod.length;x++){
          let a = prod[x].prodCode;
          
          if(a==prodCode){
            unit = prod[x].unit;
          }
        }
        return unit;
  }
  //생산계획쪽 최초 빈행 표시.
  grid.resetData([{empCode:empCode, empName:empName, registrationDate : today, startDate : today, endDate : today}]);
  //생산계획 상세 내부 입력시 처리할 이벤트
  var colval=[];
  grid2.on('editingStart',e=>{
    colval=[]
    let g2 = grid2.getData();
    for(let obj of g2){
      let x = {
        rowKey : obj.rowKey,
        prodCode : obj.prodCode,
        priority : obj.priority
      }
      colval.push(x)
    }
  })
  grid2.on('editingFinish',e=>{
    let key = e.rowKey;
    //중복체크
    for(let obj of colval){
      if(key==obj.rowKey){
        continue;
      }else{
        if(grid2.getValue(key,'prodCode')==obj.prodCode&&grid2.getValue(key,'prodCode')!=null){
          toastr.error('이미 선택된 제품은 중복으로 선택이 불가합니다.')
          grid2.setValue(key,'prodCode',null)
          return;
        }
        if(grid2.getValue(key,'priority')==obj.priority&&grid2.getValue(key,'priority')!=null){
          toastr.error('이미 입력된 순위는 중복으로 선택이 불가합니다.')
          grid2.setValue(key,'priority',null)
          return;
        }
      }
    }

          //단위,자동부여.
          if(grid2.getValue(key,'unit')==null){
            grid2.setValue(key,'unit',getUnit(grid2.getValue(key,'prodCode')))
          }
      }
  );
  //grid3(생산계획모달) 그리드 클릭 이벤트.
  grid3.on('dblclick',e=>{
    let key = e.rowKey;
    if(key != null){
      if(grid3.getValue(key,'processStatus')=='처리완료'){
        toastr.error('이미 처리완료된 계획은 불러올 수 없습니다.')
        return;
      }
      console.log(grid3.getRow(key))
      grid.resetData([grid3.getRow(key)]);
      $('#search-ManuPlan-Modal').modal('hide')
      getPlanDetail(grid3.getRow(key).manuPlanCode)
    }
    let promise = new Promise((resolve, reject) => {
    setTimeout(() => {
      resolve(function(){
        let data=grid2.getData();
        for(let i=0;i<data.length;i++){
          if(data[i].processStatus!='요청'){
            grid2.disable(i);
          }
        }
      });
      }, 350);
    });
  });
  orderGrid.on('dblclick', e=>{
    let key = e.rowKey;
    let ps = orderGrid.getValue(key,'status');
    if(ps !='요청'){
      toastr.error('요청상태의 주문만 생산계획에 불러올 수 있습니다.')
      return;
    }
    if(key != null){
      let code=orderGrid.getValue(key,'orderCode');
      getDataByOrderCode(code);
      $('#search-MatOrder-Modal').modal('hide')
    }
  })
  
  //계획내역 버튼누르면 모달띄우는 클릭이벤트
  $('#planBtn').on('click',function(){
      $('#search-ManuPlan-Modal').modal('show')
      getManuPlan('a.emp_code','%')
    })
    $('#resetPlanBtn').on('click',function(){
      grid.resetData([{empCode:empCode, empName:empName, registrationDate : today, startDate : today, endDate : today}]);
      grid2.resetData([]);
    })
//모달 그리드 리프레시

    function ajaxOrderList(orderCode, orderName, clientName, prodName) {
      
      ajaxCalled = true;
      $.ajax({
            url: "/orderManuModal",
            method: "GET",
            data: {
                orderCode: orderCode,
                orderName: orderName,
                clientName: clientName,
                prodName: prodName,
            },
            success: function(result) {
                modalDisplay(result);
            },
            error: function(error) {
                toastr.error('AJAX 요청 실패:', error);
            }
        });
    }
    // AJAX로 받아서 display
    function modalDisplay(data) {
      orderGrid.resetData([])
      orderGrid.resetData(data)
