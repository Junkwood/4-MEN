<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head th:replace="common/configs/config :: ConfigFragment"></head>

<body class="sb-nav-fixed">
	<nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
		<!-- Navbar Brand-->
		<a class="navbar-brand ps-3" href="/">ALL-IN-ONE</a>
		<!-- Toggle sidebar button -->
		<button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0"
			id="sidebarToggle" aria-controls="layoutSidenav">
			<i class="fas fa-bars"></i>
		</button>
		<!-- Navbar items -->
		<div class="collapse navbar-collapse justify-content-end"
			id="navbarSupportedContent">
			<div class="nav" style="padding: 20px; font-size: 1.2em; color: white;">
							<a class="nav-link" th:href="@{/chat}" style="color: yellow; font-size: 30px;">
									<i class="bi-chat-dots"></i>
							</a>
						</div>
			<ul class="navbar-nav">
				<li class="nav-item dropdown"><a
					class="nav-link dropdown-toggle" id="navbarDropdown" href="#"
					role="button" data-bs-toggle="dropdown" aria-expanded="false">
						<i class="fas fa-user fa-fw"></i>
				</a>
					<ul class="dropdown-menu dropdown-menu-end"
						aria-labelledby="navbarDropdown">
						<!-- <li><a class="dropdown-item" href="#">Settings</a></li> -->
						<li sec:authorize="isAuthenticated()">
							<form id="logoutForm" th:action="@{/account/login}" method="POST">
								<input type="hidden" name="${ _csrf.parameterName }"
									value="${ _csrf.token }"> <a class="dropdown-item"
									href="#" onclick="$(logoutForm).submit()">Logout</a>
							</form>
						</li>
						
						<li sec:authorize="!isAuthenticated()">
							<form id="logoutForm" th:action="@{/logout}" method="POST">
								<input type="hidden" name="${ _csrf.parameterName }"
									value="${ _csrf.token }"> <a class="dropdown-item"
									href="#" onclick="$(logoutForm).submit()">login</a>
							</form>
					</ul></li>
			</ul>
		</div>
	</nav>

	<div id="layoutSidenav">
		<!-- header fragment -->
		<div th:replace="common/fragments/header :: HeaderFragment"></div>

		<div id="layoutSidenav_content">
			<main>
				<div class="container-fluid px-4">
					<!-- content fragment -->
					<th:block layout:fragment="Content"></th:block>
				</div>
			</main>
			<!-- Footer content fragment -->
			<footer th:replace="common/fragments/footer :: FooterFragment"></footer>
		</div>
	</div>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
		crossorigin="anonymous"></script>
	<script th:src="@{/js/scripts.js}"></script>
	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js"
		crossorigin="anonymous"></script>
	<!-- <script src="assets/demo/chart-area-demo.js"></script>
        <script src="assets/demo/chart-bar-demo.js"></script> -->

	<script
		src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
		crossorigin="anonymous"></script>
	<script th:src="@{/js/datatables-simple-demo.js}"></script>
</body>
</html>
